name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Forbid external scripts in built HTML
        run: |
          if grep -E '<script[^>]+src="https?://' dist/index.html; then
            echo "::error::外部スクリプト読み込みは禁止 (設計書 §12.3)"
            exit 1
          fi
          grep -q 'Content-Security-Policy' dist/index.html || {
            echo "::error::CSP メタタグがビルド成果物にありません"
            exit 1
          }
